services:
  qwen-tts:
    build:
      context: .
      dockerfile: Dockerfile
    image: qwen-tts-validation:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Set HF_TOKEN in your shell environment if needed for gated model variants
      # Public models (Qwen/Qwen3-TTS-12Hz-1.7B-Base) do not require a token
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/workspace/.cache/huggingface
      - TORCH_HOME=/workspace/.cache/torch
      # Reduce CUDA memory fragmentation on GB10 unified memory (ref: article)
      # Note: PYTORCH_CUDA_ALLOC_CONF was renamed to PYTORCH_ALLOC_CONF in torch 2.9
      - PYTORCH_ALLOC_CONF=expandable_segments:True
    volumes:
      # Bind mounts: editable without rebuilding the image
      - ./scripts:/workspace/scripts:ro
      - ./sample_audio:/workspace/sample_audio:ro
      # Output: bind mount so generated audio is immediately accessible on host
      - ./output:/workspace/output
      # Speaker profiles: bind mount so .pt files persist across containers
      - ./speaker_profiles:/workspace/speaker_profiles
      # Named volumes: persist model weights across container rebuilds
      - hf_cache:/workspace/.cache/huggingface
      - torch_cache:/workspace/.cache/torch
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: bash

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: qwen-tts-validation:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/workspace/.cache/huggingface
      - TORCH_HOME=/workspace/.cache/torch
      - PYTORCH_ALLOC_CONF=expandable_segments:True
    ports:
      - "7865:7865"
    volumes:
      - ./api:/workspace/api:ro
      - ./scripts:/workspace/scripts:ro
      - ./sample_audio:/workspace/sample_audio:ro
      - ./output:/workspace/output
      - ./speaker_profiles:/workspace/speaker_profiles
      - hf_cache:/workspace/.cache/huggingface
      - torch_cache:/workspace/.cache/torch
    working_dir: /workspace
    command: uvicorn api.main:app --host 0.0.0.0 --port 7865

  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: qwen-tts-validation:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/workspace/.cache/huggingface
      - TORCH_HOME=/workspace/.cache/torch
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      # API サーバーのベース URL（WebUI からの呼び出し先）
      - TTS_API_URL=http://api:7865
    ports:
      - "7860:7860"
    volumes:
      - ./webui:/workspace/webui:ro
      - ./scripts:/workspace/scripts:ro
      - ./sample_audio:/workspace/sample_audio:ro
      - ./output:/workspace/output
      - ./speaker_profiles:/workspace/speaker_profiles
      - hf_cache:/workspace/.cache/huggingface
      - torch_cache:/workspace/.cache/torch
    working_dir: /workspace
    depends_on:
      - api
    command: python3 webui/app.py

volumes:
  hf_cache:
    driver: local
  torch_cache:
    driver: local
